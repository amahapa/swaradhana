<!DOCTYPE html>
<html>
<head><title>Tabla Sample Test</title></head>
<body style="background:#0F1221; color:#E8ECF4; font-family:sans-serif; padding:20px;">
  <h2>Tabla Sample Player Test</h2>
  <button id="btn-init" style="padding:12px 24px; margin:8px; font-size:16px; cursor:pointer;">1. Init Audio</button>
  <button id="btn-load" style="padding:12px 24px; margin:8px; font-size:16px; cursor:pointer;">2. Load Samples</button>
  <button id="btn-play" style="padding:12px 24px; margin:8px; font-size:16px; cursor:pointer;">3. Play Direct</button>
  <button id="btn-switch" style="padding:12px 24px; margin:8px; font-size:16px; cursor:pointer;">4. Switch tabla.js mode</button>
  <button id="btn-play-tabla" style="padding:12px 24px; margin:8px; font-size:16px; cursor:pointer;">5. Play via tabla.js</button>
  <div id="log" style="margin-top:20px; padding:12px; background:#1A1F36; border-radius:8px; font-family:monospace; font-size:13px; white-space:pre-wrap; max-height:400px; overflow-y:auto;">Ready.</div>

  <script type="module">
    const logEl = document.getElementById('log');
    function log(msg) { logEl.textContent += '\n' + msg; console.log(msg); }

    // Import all modules at the top level — they share the same singletons
    const audioEngine = (await import('./js/audio-engine.js')).default;
    const tablaSamplePlayer = (await import('./js/tabla-samples.js')).default;
    const tabla = (await import('./js/tabla.js')).default;
    log('✓ All modules imported');

    // 1. Init
    document.getElementById('btn-init').addEventListener('click', async () => {
      try {
        await audioEngine.init();
        await audioEngine.resume();
        log('✓ Audio init. State: ' + audioEngine.audioCtx.state + ' | isInit: ' + audioEngine.isInitialized);
      } catch(e) { log('✗ ' + e.message); }
    });

    // 2. Load samples
    document.getElementById('btn-load').addEventListener('click', async () => {
      try {
        log('Loading...');
        await tablaSamplePlayer.loadSampleSet('assets/audio/tabla/tabla_e_1');
        log('✓ Loaded ' + Object.keys(tablaSamplePlayer.buffers).length + ' buffers: ' + Object.keys(tablaSamplePlayer.buffers).join(', '));
        log('  isLoaded: ' + tablaSamplePlayer.isLoaded);
      } catch(e) { log('✗ ' + e.message + '\n' + e.stack); }
    });

    // 3. Play directly via sample player
    document.getElementById('btn-play').addEventListener('click', () => {
      try {
        if (!audioEngine.isInitialized) { log('✗ Init first!'); return; }
        if (!tablaSamplePlayer.isLoaded) { log('✗ Load first!'); return; }
        const now = audioEngine.audioCtx.currentTime;
        tablaSamplePlayer.playBol('Dha', now, 1.0);
        tablaSamplePlayer.playBol('Dhin', now + 0.6, 0.85);
        tablaSamplePlayer.playBol('Tin', now + 1.2, 0.5);
        tablaSamplePlayer.playBol('Ta', now + 1.8, 0.65);
        log('✓ Playing Dha-Dhin-Tin-Ta directly');
      } catch(e) { log('✗ ' + e.message + '\n' + e.stack); }
    });

    // 4. Switch tabla.js to sample mode
    document.getElementById('btn-switch').addEventListener('click', async () => {
      try {
        log('tabla.mode BEFORE: ' + tabla.mode);
        await tabla.setMode('assets/audio/tabla/tabla_e_1');
        log('tabla.mode AFTER: ' + tabla.mode);
        log('tablaSamplePlayer.isLoaded: ' + tablaSamplePlayer.isLoaded);
      } catch(e) { log('✗ ' + e.message + '\n' + e.stack); }
    });

    // 5. Play via tabla.js (should use samples if mode is set)
    document.getElementById('btn-play-tabla').addEventListener('click', () => {
      try {
        if (!audioEngine.isInitialized) { log('✗ Init first!'); return; }
        log('tabla.mode: ' + tabla.mode);
        const now = audioEngine.audioCtx.currentTime;
        tabla.playBolAtTime('Dha', now, 1.0, 0.6);
        tabla.playBolAtTime('Dhin', now + 0.6, 0.85, 0.6);
        tabla.playBolAtTime('Tin', now + 1.2, 0.5, 0.6);
        tabla.playBolAtTime('Ta', now + 1.8, 0.65, 0.6);
        log('✓ Playing via tabla.playBolAtTime');
      } catch(e) { log('✗ ' + e.message + '\n' + e.stack); }
    });
  </script>
</body>
</html>
